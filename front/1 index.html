<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aviso - Portal Escolar</title>
    <link rel="stylesheet" href="style_cadastro.css">
</head>
<body>

    <div class="container">
        <main class="content-card">
            <span class="badge">Administração</span>
            <h2>CADASTRO DE AVISO</h2>
            
            <p class="form-instruction">
                Preencha os campos abaixo para publicar um novo comunicado na Central de Avisos Escolares.
            </p>

            <form class="project-form">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Digite o título do aviso">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="5" placeholder="Digite o conteúdo do aviso"></textarea>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" name="categoria">
                        <option value="geral">Geral</option>
                        <option value="prova">Prova / Avaliação</option>
                        <option value="evento">Evento Escolar</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Salvar aviso ➔</button>
            </form>
        </main>
    </div>

</body>
</html>
